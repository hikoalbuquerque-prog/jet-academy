<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jet Academy</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192x192-maskable.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jet Academy" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0D1117" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0D1117;
      font-family: 'Nunito', sans-serif;
      color: #fff;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
    }
    img.logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .title {
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, #58CC02, #1CB0F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub {
      font-size: 15px;
      color: #8b949e;
      text-align: center;
      line-height: 1.5;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(88,204,2,.2);
      border-top-color: #58CC02;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg {
      font-size: 13px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <img class="logo" src="icons/icon-512x512.png" alt="Jet Academy" />
  <div class="title">Jet Academy</div>
  <div class="sub">Treinamento de Promotores</div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Abrindo o app…</div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwf06-v_N-rtDBgKGrT9SkszDznsxfrYCKIJKPVKxT0OAVVuXUuQ7TVd_3_lg1cgI3cRA/exec';

    // Preserve any ?token= or ?t= params
    const params = window.location.search;
    const target = GAS_URL + (params || '');

    // Register SW for PWA installability
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Redirect immediately
    window.location.replace(target);

    // Fallback message if redirect takes too long
    setTimeout(() => {
      document.getElementById('msg').innerHTML =
        'Redirecionando… <a href="' + target + '" style="color:#58CC02">clique aqui</a>';
    }, 2000);
  </script>
</body>
</html>
