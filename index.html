<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Jet Academy</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192x192-maskable.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jet Academy" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0D1117" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0D1117;
      overflow: hidden;
    }
    #frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #0D1117;
    }
    /* Splash shown while iframe loads */
    #splash {
      position: fixed;
      inset: 0;
      background: #0D1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity .4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash img {
      width: 110px; height: 110px;
      border-radius: 22px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .title {
      font-family: sans-serif;
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg,#58CC02,#1CB0F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(88,204,2,.15);
      border-top-color: #58CC02;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <img src="icons/icon-512x512.png" alt="Jet Academy" />
    <div class="title">Jet Academy</div>
    <div class="spinner"></div>
  </div>

  <!-- App iframe -->
  <iframe
    id="frame"
    src="https://script.google.com/macros/s/AKfycbwf06-v_N-rtDBgKGrT9SkszDznsxfrYCKIJKPVKxT0OAVVuXUuQ7TVd_3_lg1cgI3cRA/exec"
    allow="clipboard-write"
    loading="eager"
  ></iframe>

  <script>
    // Register SW — required for PWA install prompt
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Hide splash once iframe fires load (or after 4s fallback)
    const frame = document.getElementById('frame');
    const splash = document.getElementById('splash');

    function hideSplash() {
      splash.classList.add('hide');
      setTimeout(() => splash.remove(), 500);
    }

    frame.addEventListener('load', hideSplash);
    setTimeout(hideSplash, 4000);
  </script>
</body>
</html>
